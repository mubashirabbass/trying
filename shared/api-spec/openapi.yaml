components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, teacher, admin]
        phone:
          type: string
        cnic:
          type: string
        branchId:
          type: integer
      required: [name, email, password, role]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, teacher, admin]
        phone:
          type: string
        cnic:
          type: string
        avatar:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, email, role, isActive, createdAt]

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, teacher, admin]
        phone:
          type: string
        cnic:
          type: string
        branchId:
          type: integer
      required: [name, email, password, role]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string
        isActive:
          type: boolean
        branchId:
          type: integer

    Course:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        duration:
          type: string
        fee:
          type: number
        thumbnail:
          type: string
        teacherId:
          type: integer
        teacherName:
          type: string
        isFeatured:
          type: boolean
        isFree:
          type: boolean
        enrollmentCount:
          type: integer
        lessonCount:
          type: integer
        createdAt:
          type: string
      required: [id, title, description, category, duration, fee, isFeatured, isFree, enrollmentCount, lessonCount, createdAt]

    CourseDetail:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            syllabus:
              type: string
            lessons:
              type: array
              items:
                $ref: "#/components/schemas/Lesson"
            assignments:
              type: array
              items:
                $ref: "#/components/schemas/Assignment"

    CreateCourseBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        duration:
          type: string
        fee:
          type: number
        thumbnail:
          type: string
        syllabus:
          type: string
        teacherId:
          type: integer
        isFeatured:
          type: boolean
        isFree:
          type: boolean
      required: [title, description, category, duration, fee]

    CourseStats:
      type: object
      properties:
        totalCourses:
          type: integer
        totalEnrollments:
          type: integer
        popularCourses:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              enrollmentCount:
                type: integer
            required: [id, title, enrollmentCount]
        categoryBreakdown:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
            required: [category, count]
      required: [totalCourses, totalEnrollments, popularCourses, categoryBreakdown]

    Lesson:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        description:
          type: string
        videoUrl:
          type: string
        pdfUrl:
          type: string
        duration:
          type: integer
        orderIndex:
          type: integer
        isCompleted:
          type: boolean
      required: [id, courseId, title, orderIndex]

    CreateLessonBody:
      type: object
      properties:
        courseId:
          type: integer
        title:
          type: string
        description:
          type: string
        videoUrl:
          type: string
        pdfUrl:
          type: string
        duration:
          type: integer
        orderIndex:
          type: integer
      required: [courseId, title, orderIndex]

    LessonProgressBody:
      type: object
      properties:
        isCompleted:
          type: boolean
        watchedSeconds:
          type: integer
      required: [isCompleted]

    LessonProgress:
      type: object
      properties:
        lessonId:
          type: integer
        userId:
          type: integer
        isCompleted:
          type: boolean
        watchedSeconds:
          type: integer
      required: [lessonId, userId, isCompleted]

    Enrollment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        courseId:
          type: integer
        courseName:
          type: string
        userName:
          type: string
        progress:
          type: number
        status:
          type: string
          enum: [active, completed, suspended]
        enrolledAt:
          type: string
      required: [id, userId, courseId, progress, status, enrolledAt]

    CreateEnrollmentBody:
      type: object
      properties:
        userId:
          type: integer
        courseId:
          type: integer
      required: [userId, courseId]

    Assignment:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        description:
          type: string
        dueDate:
          type: string
        totalMarks:
          type: integer
        createdAt:
          type: string
      required: [id, courseId, title, totalMarks, createdAt]

    CreateAssignmentBody:
      type: object
      properties:
        courseId:
          type: integer
        title:
          type: string
        description:
          type: string
        dueDate:
          type: string
        totalMarks:
          type: integer
      required: [courseId, title, totalMarks]

    AssignmentSubmission:
      type: object
      properties:
        id:
          type: integer
        assignmentId:
          type: integer
        userId:
          type: integer
        fileUrl:
          type: string
        notes:
          type: string
        submittedAt:
          type: string
        marks:
          type: integer
        feedback:
          type: string
        status:
          type: string
          enum: [submitted, graded, late]
        userName:
          type: string
        assignmentTitle:
          type: string
        dueDate:
          type: string
          format: date-time
          nullable: true
      required: [id, assignmentId, userId, status]

    SubmitAssignmentBody:
      type: object
      properties:
        fileUrl:
          type: string
        notes:
          type: string
      required: [fileUrl]

    GradeAssignmentBody:
      type: object
      properties:
        submissionId:
          type: integer
        marks:
          type: integer
        feedback:
          type: string
      required: [submissionId, marks]

    Quiz:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
        totalMarks:
          type: integer
        timeLimit:
          type: integer
        createdAt:
          type: string
      required: [id, courseId, title, totalMarks, createdAt]

    QuizQuestion:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
        marks:
          type: integer
      required: [id, question, options, marks]

    CreateQuizBody:
      type: object
      properties:
        courseId:
          type: integer
        title:
          type: string
        questions:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              options:
                type: array
                items:
                  type: string
              correctOption:
                type: integer
              marks:
                type: integer
            required: [question, options, correctOption, marks]
        totalMarks:
          type: integer
        timeLimit:
          type: integer
      required: [courseId, title, questions, totalMarks]

    SubmitQuizBody:
      type: object
      properties:
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: integer
              selectedOption:
                type: integer
            required: [questionId, selectedOption]
      required: [answers]

    QuizResult:
      type: object
      properties:
        quizId:
          type: integer
        userId:
          type: integer
        score:
          type: integer
        totalMarks:
          type: integer
        percentage:
          type: number
        passed:
          type: boolean
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: integer
              correct:
                type: boolean
              selectedOption:
                type: integer
              correctOption:
                type: integer
            required: [questionId, correct, selectedOption, correctOption]
      required: [quizId, userId, score, totalMarks, percentage, passed]

    Payment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        courseId:
          type: integer
        userName:
          type: string
        courseName:
          type: string
        amount:
          type: number
        method:
          type: string
          enum: [card, bank_transfer, easypaisa, jazzcash, cash]
        status:
          type: string
          enum: [pending, verified, rejected]
        receiptUrl:
          type: string
        createdAt:
          type: string
      required: [id, userId, courseId, amount, method, status, createdAt]

    CreatePaymentBody:
      type: object
      properties:
        courseId:
          type: integer
        amount:
          type: number
        method:
          type: string
          enum: [card, bank_transfer, easypaisa, jazzcash, cash]
        receiptUrl:
          type: string
      required: [courseId, amount, method]

    VerifyPaymentBody:
      type: object
      properties:
        status:
          type: string
          enum: [verified, rejected]
        notes:
          type: string
      required: [status]

    Testimonial:
      type: object
      properties:
        id:
          type: integer
        studentName:
          type: string
        courseName:
          type: string
        content:
          type: string
        rating:
          type: integer
        avatar:
          type: string
        createdAt:
          type: string
      required: [id, studentName, courseName, content, rating, createdAt]

    CreateTestimonialBody:
      type: object
      properties:
        studentName:
          type: string
        courseName:
          type: string
        content:
          type: string
        rating:
          type: integer
        avatar:
          type: string
      required: [studentName, courseName, content, rating]

    SuccessStory:
      type: object
      properties:
        id:
