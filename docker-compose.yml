version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_pass}
      POSTGRES_DB: ${POSTGRES_DB:-edusphere}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lms}:${POSTGRES_PASSWORD:-lms_pass}@db:5432/${POSTGRES_DB:-edusphere}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
    depends_on:
      - db

volumes:
  postgres_data:
