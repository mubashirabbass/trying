kind = "web"
previewPath = "/"
title = "Global College LMS"
version = "1.0.0"
id = "artifacts/global-college"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18176

[services.development]
run = "pnpm --filter @workspace/global-college run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/global-college", "run", "build" ]
publicDir = "artifacts/global-college/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18176"
BASE_PATH = "/"
